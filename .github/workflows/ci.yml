name: CI Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
    paths:
      - "tests/**"
      - "scripts/**"
      - "app/**"
      - "components/**"
      - "lib/**"
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - ".github/workflows/ci.yml"
      - ".github/workflows/production-smoke.yml"
  pull_request:
    branches:
      - master
    paths:
      - "tests/**"
      - "scripts/**"
      - "app/**"
      - "components/**"
      - "lib/**"
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - ".github/workflows/ci.yml"
      - ".github/workflows/production-smoke.yml"
  workflow_dispatch:

jobs:
  test:
    name: Automated Test Stack
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm run test:unit

      - name: Run API integration tests
        run: npm run test:api

      - name: Build app
        run: npm run build

      - name: Run local Playwright E2E
        run: npm run test:e2e

      - name: Add Playwright summary
        if: always()
        run: node scripts/playwright-summary.mjs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-local-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
