name: Playwright E2E

on:
  push:
    branches:
      - master
    paths:
      - "tests/**"
      - "src/**"
      - "app/**"
      - "components/**"
      - "lib/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
  pull_request:
    branches:
      - master
    paths:
      - "tests/**"
      - "src/**"
      - "app/**"
      - "components/**"
      - "lib/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E Tests - Test Execution
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start app
        run: |
          npm run dev > /tmp/pixelpress-next.log 2>&1 &
          echo $! > /tmp/pixelpress-next.pid

      - name: Wait for app
        run: npx wait-on http://127.0.0.1:3000

      - name: Run Playwright tests
        run: PLAYWRIGHT_BASE_URL=http://127.0.0.1:3000 npx playwright test

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/pixelpress-next.pid ]; then
            kill "$(cat /tmp/pixelpress-next.pid)" || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
