name: Playwright E2E

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
    paths:
      - "tests/**"
      - "src/**"
      - "app/**"
      - "components/**"
      - "lib/**"
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - ".github/workflows/playwright.yml"
  pull_request:
    branches:
      - master
    paths:
      - "tests/**"
      - "src/**"
      - "app/**"
      - "components/**"
      - "lib/**"
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - ".github/workflows/playwright.yml"
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E Tests - Test Execution
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start app
        run: |
          npm run dev > /tmp/pixelpress-next.log 2>&1 &
          echo $! > /tmp/pixelpress-next.pid

      - name: Wait for app
        run: npx wait-on http://127.0.0.1:3000

      - name: Run Playwright tests
        run: PLAYWRIGHT_BASE_URL=http://127.0.0.1:3000 npx playwright test

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/pixelpress-next.pid ]; then
            kill "$(cat /tmp/pixelpress-next.pid)" || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  production_webp:
    name: Playwright Production WebP Validation
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: e2e

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Vercel deployment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          for attempt in {1..30}; do
            state=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/status --jq '.statuses[]? | select(.context == "Vercel") | .state' | head -n 1)
            if [ "$state" = "success" ]; then
              echo "Vercel deployment is ready."
              exit 0
            fi
            echo "Waiting for Vercel deployment... attempt $attempt"
            sleep 10
          done
          echo "Timed out waiting for Vercel deployment."
          exit 1

      - name: Run production WebP validation
        run: RUN_PRODUCTION_WEBP_TEST=1 PLAYWRIGHT_BASE_URL=https://tutool1.vercel.app npx playwright test tests/e2e/production-webp.spec.ts

      - name: Upload production Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-production-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
